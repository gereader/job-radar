# portals.yml — job boards to scan. One entry per company.
#
# Supported sources: greenhouse | ashby | lever | workable | linkedin | manual
# The `slug` is the portal-native identifier (e.g. the subdomain).

title_filter:
  # Applied after portal fetch, before keyword screen. Cheap string contains.
  # Customize to YOUR target role family — the terms below are illustrative,
  # not a default.
  positive: []      # e.g. ["engineer", "architect", "designer", "product manager"]
  negative: []      # e.g. ["intern", "manager"] if you're an IC, or ["junior"] at a different level

companies:
  # Seed set: one valid entry per supported source. Replace with the
  # companies YOU care about — the list below exists to illustrate
  # schema and source values, not to recommend who to scan. Scanners
  # are zero-token, so enable generously once you've curated your list.
  #
  # Supported sources: greenhouse | ashby | lever | workable | linkedin | manual
  - { name: "Example Greenhouse Co", source: greenhouse, slug: "example-slug",   enabled: false }
  - { name: "Example Ashby Co",      source: ashby,      slug: "example-slug",   enabled: false }
  - { name: "Example Lever Co",      source: lever,      slug: "example-slug",   enabled: false }
  # Tip: find a company's slug by visiting their careers page and looking
  # for boards.greenhouse.io/<slug> / jobs.ashbyhq.com/<slug> /
  # jobs.lever.co/<slug> in the HTML or network tab.
