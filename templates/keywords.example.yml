# keywords.yml — pre-screen rules. Zero LLM, pure Python scorer.
#
# `field` restricts where a term must match: any|title|description|location
# `weight` is added (positive) or subtracted (negative) from the score.
# `dealbreaker` terms drop the verdict to "skip" regardless of score.
#
# The entries below are EXAMPLES to illustrate the schema. Replace them
# with your own — the right keywords depend entirely on what role you're
# targeting, what stack you work in, and what you want to avoid. The
# example role here is "generic software IC," not a prescription.

positive:
  # Language / stack you want to see
  - { term: "your-primary-language",  weight: 8, field: any }
  - { term: "your-primary-framework", weight: 5, field: any }
  # Location / remote preference
  - { term: "remote",                 weight: 5, field: any }
  # Level keywords that match your seniority
  - { term: "senior",                 weight: 4, field: title }

negative:
  # Languages / stacks you don't want
  - { term: "a-language-you-avoid",   weight: 4, field: any }
  # Wrong-level roles
  - { term: "junior",                 weight: 6,  field: title }
  - { term: "intern",                 weight: 10, field: title }

dealbreaker:
  # Examples — replace with your own. Each term here triggers an
  # unconditional skip regardless of score.
  - { term: "REPLACE_WITH_YOUR_LOCATION_DEALBREAKER", field: location }
  - { term: "REPLACE_WITH_YOUR_POLICY_DEALBREAKER",   field: description }
