# profile.yml — personal config. Lives under private/, gitignored.
identity:
  name: "Your Name"
  email: "you@example.com"
  phone: ""
  location: "City, ST"
  timezone: "America/Los_Angeles"
  links:
    linkedin: ""
    github: ""
    portfolio: ""

targets:
  titles:
    - "Your Target Title 1"              # e.g. "Senior Software Engineer", "Engineering Manager"
    - "Your Target Title 2"
  archetypes:
    - name: "primary-archetype"
      priority: 10
      description: "What you most want to do next."
    - name: "secondary-archetype"
      priority: 5
      description: "Adjacent fit."
  comp:
    # Set to your local market. Numbers below are placeholders, not a target.
    min: 100000
    target: 150000
    max: 200000
    currency: "USD"                      # change for your market
  location_policy: "remote"              # remote|hybrid|onsite|flexible
  remote_regions: []                     # e.g. ["US"], ["EU"], ["UK", "EU"]
  dealbreakers:
    - "REPLACE_WITH_YOUR_DEALBREAKER_1"  # e.g. "on-site in SF Bay Area"
    - "REPLACE_WITH_YOUR_DEALBREAKER_2"  # e.g. "5+ days/week office"
  # Optional geo pre-filter for `jr triage` auto-skip. If both lists are
  # empty or missing, the filter is off — every role goes to the LLM.
  # Populate with location markers that should KEEP a role in the queue;
  # roles whose location field and JD body contain none of these are
  # auto-skipped with reason "geo_mismatch" (zero LLM cost).
  #
  # Example for a US-only candidate:
  #   geo_markers:
  #     phrases: ["United States", "USA", "US remote", "Seattle", "New York", "San Francisco"]
  #     state_codes: [CA, NY, WA, TX, MA, IL, CO, OR, NJ]   # matched case-sensitively, must follow ", "
  geo_markers:
    phrases: []
    state_codes: []

narrative:
  superpower: ""
  best_achievement: ""
  excites: []
  drains: []

scoring:
  # 0-100 pre-screen thresholds. Jobs >= pass_at skip LLM triage.
  pass_at: 70
  review_at: 40
  # below review_at → skip (no LLM work).
  # 0-5 triage threshold — above this, offer to auto-run company research.
  research_threshold: 4.0
  # Auto-prune JDs whose triage score_0_5 is AT or BELOW this threshold.
  # The JD file is deleted and the job row is archived, but its content hash
  # stays in the DB so future scans recognize and skip it.
  #
  # Default: 0.0 (off). Set to a value like 1.0 or 1.5 to opt in.
  # Safety: applications already in Applied/Responded/Interview/Offer are
  # ALWAYS exempt — auto-prune cannot delete a JD attached to active work.
  auto_prune_below: 0.0

llm:
  # Model IDs. Keep Haiku for triage, Sonnet for evals, Opus for offers.
  triage_model: "claude-haiku-4-5-20251001"
  eval_model:   "claude-sonnet-4-6"
  offers_model: "claude-opus-4-7"

# Limits for LLM-emitting commands. Each command pre-ranks in pure Python
# and slices to default_llm_batch by default; pass --limit N or --all to override.
limits:
  default_llm_batch: 10

# Concurrency knobs for `jr scan`.
scan:
  max_workers: 8          # parallel portal fetches
  rate_ms: 250            # wait this many ms before each portal's first request

jd_lifecycle:
  active_days: 90      # move unapplied JDs to archive after N days
  purge_days: 365      # delete from disk after N days (hash kept)

# US salary-transparency states. JDs in these locations that omit any
# numeric comp signal will get a `salary-hidden-in-transparency-state`
# screen reason and lose the configured weight from keywords.yml.
# Remove or clear this list if you're not targeting US roles — the
# feature is US-pay-transparency-law-specific.
transparency_states: []  # e.g. [WA, CA, CO, NY, IL, MD, RI, HI]
